const getScoreColor = (score) => {
  if (score <= 40) return { bg: 'bg-red-950/40', text: 'text-red-400', border: 'border-red-900', hex: '#f87171' };
  if (score <= 60) return { bg: 'bg-amber-950/40', text: 'text-amber-400', border: 'border-amber-900', hex: '#fbbf24' };
  if (score <= 80) return { bg: 'bg-teal-950/40', text: 'text-teal-400', border: 'border-teal-900', hex: '#2dd4bf' };
  return { bg: 'bg-cyan-950/40', text: 'text-cyan-400', border: 'border-cyan-900', hex: '#22d3ee' };
};

const getScoreLabel = (s) => s <= 40 ? 'Weak' : s <= 60 ? 'At Risk' : s <= 80 ? 'Gaining' : 'Strong';

const TrendBadge = ({ trend, size = 'sm' }) => {
  const isUp = trend > 0;
  const isDown = trend < 0;
  const Icon = isUp ? TrendingUp : isDown ? TrendingDown : Minus;
  const color = isUp ? 'text-teal-600' : isDown ? 'text-red-500' : 'text-neutral-400';
  return (
    <span className={`inline-flex items-center gap-1 ${color} ${size === 'lg' ? 'text-base' : 'text-xs'} font-semibold`}>
      <Icon className={size === 'lg' ? 'w-4 h-4' : 'w-3 h-3'} />
      {isUp ? '+' : ''}{trend}
    </span>
  );
};

const REGION_COORDS = [
  { name: 'Europe', lat: 48, lng: 10, score: 74, trend: 3 },
  { name: 'Asia-Pacific', lat: 25, lng: 105, score: 72, trend: 4 },
  { name: 'North America', lat: 40, lng: -100, score: 68, trend: -1 },
  { name: 'Middle East', lat: 25, lng: 45, score: 71, trend: 2 },
  { name: 'Latin America', lat: -15, lng: -55, score: 62, trend: -3 }
];

// latLng → plain xyz (no THREE dependency at module level)
const latLngToXYZ = (lat, lng, radius) => {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  return {
    x: -(radius * Math.sin(phi) * Math.cos(theta)),
    y: radius * Math.cos(phi),
    z: radius * Math.sin(phi) * Math.sin(theta)
  };
};

const Globe3D = () => {
  const mountRef = useRef(null);
  const [hovered, setHovered] = useState(null);
  const isDragging = useRef(false);
  const previousMouse = useRef({ x: 0, y: 0 });
  const rotationVelocity = useRef({ x: 0, y: 0 });
  const globeRotation = useRef({ x: 0.3, y: 0 });

  useEffect(() => {
    const container = mountRef.current;
    if (!container) return;

    // Load Three.js from CDN dynamically — avoids module-level import failures
    const loadThree = () => new Promise((resolve, reject) => {
      if (window.THREE) { resolve(window.THREE); return; }
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
      script.onload = () => resolve(window.THREE);
      script.onerror = reject;
      document.head.appendChild(script);
    });

    let cleanup = () => {};

    loadThree().then(THREE => {
      const width = 280, height = 280;

      const toVec3 = (xyz) => new THREE.Vector3(xyz.x, xyz.y, xyz.z);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
      camera.position.z = 3.2;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      const globeGroup = new THREE.Group();
      scene.add(globeGroup);

      // Base sphere
      globeGroup.add(new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0x0a0a0a })
      ));
      // Glow
      globeGroup.add(new THREE.Mesh(
        new THREE.SphereGeometry(1.02, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0x2dd4bf, transparent: true, opacity: 0.04, side: THREE.BackSide })
      ));

      // Grid lines
      const gridMat = new THREE.LineBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.3 });
      for (let lat = -60; lat <= 60; lat += 30) {
        const pts = [];
        for (let lng = 0; lng <= 360; lng += 3) pts.push(toVec3(latLngToXYZ(lat, lng - 180, 1.002)));
        globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
      }
      for (let lng = -180; lng < 180; lng += 30) {
        const pts = [];
        for (let lat = -90; lat <= 90; lat += 3) pts.push(toVec3(latLngToXYZ(lat, lng, 1.002)));
        globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
      }

      // Region markers
      const markerMeshes = [];
      REGION_COORDS.forEach(r => {
        const xyz = latLngToXYZ(r.lat, r.lng, 1.01);
        const pos = toVec3(xyz);
        const colorHex = parseInt(getScoreColor(r.score).hex.replace('#', ''), 16);

        const ring = new THREE.Mesh(
          new THREE.RingGeometry(0.04, 0.07, 32),
          new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
        );
        ring.position.copy(pos);
        ring.lookAt(pos.clone().multiplyScalar(2));
        globeGroup.add(ring);

        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.03, 16, 16),
          new THREE.MeshBasicMaterial({ color: colorHex })
        );
        dot.position.copy(pos);
        dot.userData = { region: r.name, score: r.score, trend: r.trend };
        globeGroup.add(dot);
        markerMeshes.push(dot);

        const pulse = new THREE.Mesh(
          new THREE.RingGeometry(0.05, 0.06, 32),
          new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
        );
        pulse.position.copy(pos);
        pulse.lookAt(pos.clone().multiplyScalar(2));
        pulse.userData.isPulse = true;
        pulse.userData.pulseTime = Math.random() * Math.PI * 2;
        globeGroup.add(pulse);
      });

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      const onMouseMove = (e) => {
        const rect = container.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / height) * 2 + 1;
        if (isDragging.current) {
          const dx = e.clientX - previousMouse.current.x;
          const dy = e.clientY - previousMouse.current.y;
          rotationVelocity.current = { x: dy * 0.003, y: dx * 0.003 };
          previousMouse.current = { x: e.clientX, y: e.clientY };
        }
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(markerMeshes);
        if (hits.length > 0) {
          setHovered(hits[0].object.userData);
          container.style.cursor = 'pointer';
        } else {
          setHovered(null);
          container.style.cursor = isDragging.current ? 'grabbing' : 'grab';
        }
      };
      const onMouseDown = (e) => {
        isDragging.current = true;
        previousMouse.current = { x: e.clientX, y: e.clientY };
        container.style.cursor = 'grabbing';
      };
      const onMouseUp = () => { isDragging.current = false; container.style.cursor = 'grab'; };

      container.addEventListener('mousemove', onMouseMove);
      container.addEventListener('mousedown', onMouseDown);
      window.addEventListener('mouseup', onMouseUp);
      container.style.cursor = 'grab';

      let frameId;
      const clock = new THREE.Clock();
      const animate = () => {
        frameId = requestAnimationFrame(animate);
        if (!isDragging.current) {
          rotationVelocity.current.x *= 0.95;
          rotationVelocity.current.y *= 0.95;
          globeRotation.current.y += 0.002;
        }
        globeRotation.current.x += rotationVelocity.current.x;
        globeRotation.current.y += rotationVelocity.current.y;
        globeRotation.current.x = Math.max(-1.2, Math.min(1.2, globeRotation.current.x));
        globeGroup.rotation.x = globeRotation.current.x;
        globeGroup.rotation.y = globeRotation.current.y;
        const t = clock.getElapsedTime();
        globeGroup.children.forEach(child => {
          if (child.userData && child.userData.isPulse) {
            const phase = t * 1.5 + child.userData.pulseTime;
            const s = 1 + Math.sin(phase) * 0.6;
            child.scale.set(s, s, s);
            child.material.opacity = 0.3 * (1 - (s - 1) / 0.6);
          }
        });
        renderer.render(scene, camera);
      };
      animate();

      cleanup = () => {
        cancelAnimationFrame(frameId);
        container.removeEventListener('mousemove', onMouseMove);
        container.removeEventListener('mousedown', onMouseDown);
        window.removeEventListener('mouseup', onMouseUp);
        renderer.dispose();
        if (container.contains(renderer.domElement)) container.removeChild(renderer.domElement);
      };
    }).catch(() => {
      // Three.js failed to load — container stays empty, rest of app still works
    });

    return () => cleanup();
  }, []);

  const hoveredColor = hovered ? getScoreColor(hovered.score) : null;
  return (
    <div className="relative">
      <div ref={mountRef} style={{ width: 280, height: 280 }} />
      {hovered && (
        <div className="absolute bottom-2 left-1/2 -translate-x-1/2 bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 pointer-events-none shadow-lg" style={{ minWidth: 140 }}>
          <p className="text-[11px] font-semibold text-neutral-200 text-center">{hovered.region}</p>
          <div className="flex items-center justify-center gap-2 mt-1">
            <span className="text-sm font-bold" style={{ color: hoveredColor ? hoveredColor.hex : '#fff' }}>{hovered.score}</span>
            <TrendBadge trend={hovered.trend} />
          </div>
        </div>
      )}
    </div>
  );
};

  medium:   { label: 'Medium',   bg: 'bg-neutral-800/60', text: 'text-neutral-400', border: 'border-neutral-700' }
};

const THINKING_STEPS = [
  { label: 'Scanning active signal patterns…', icon: Radio },
  { label: 'Cross-referencing audience cohort data…', icon: Users },
  { label: 'Modelling narrative shift projections…', icon: Radar },
  { label: 'Generating action plan…', icon: ClipboardList }
];

const ScenarioView = ({ pillarId, onBack }) => {
  const [selectedId, setSelectedId] = useState(null);
  const [isThinking, setIsThinking] = useState(false);
  const [thinkStep, setThinkStep] = useState(0);
  const [visibleId, setVisibleId] = useState(null);
  const prevIdRef = useRef(null);

  useEffect(() => {
    if (selectedId && selectedId !== prevIdRef.current) {
      prevIdRef.current = selectedId;
      setIsThinking(true);
      setVisibleId(null);
      setThinkStep(0);
      var timers = [];
      THINKING_STEPS.forEach(function(_, i) {
        timers.push(setTimeout(function() { setThinkStep(i); }, i * 480));
      });
      timers.push(setTimeout(function() {
        setIsThinking(false);
        setVisibleId(selectedId);
      }, THINKING_STEPS.length * 480 + 300));
      return function() { timers.forEach(function(t) { clearTimeout(t); }); };
    }
  }, [selectedId]);

  const pillar = PILLARS.find(p => p.id === pillarId);
  const scenarios = SCENARIOS[pillarId] || [];
  if (!pillar) return null;
  const Icon = pillar.icon;
  const scenario = scenarios.find(s => s.id === visibleId) || null;
  const projectedPillar = scenario ? Math.min(100, pillar.score + scenario.impact) : null;
  const projectedOverall = scenario ? Math.min(100, OVERALL_SCORE + scenario.overallImpact) : null;

  const allSignals = SIGNALS[pillarId] || [];

  return (
    <div className="flex-1 flex flex-col min-w-0 bg-neutral-950 overflow-hidden" style={{ fontFamily: 'Inter, system-ui, sans-serif' }}>

      {/* Top bar */}
      <div className="px-6 py-3 border-b border-neutral-800/60 flex items-center justify-between bg-neutral-950 flex-shrink-0">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="flex items-center gap-1.5 text-neutral-500 hover:text-neutral-200 transition text-xs font-medium">
            <ArrowLeft className="w-3.5 h-3.5" />
            Back to {pillar.name}
          </button>
          <span className="text-neutral-700">/</span>
          <div className="flex items-center gap-2">
            <div className="w-5 h-5 rounded flex items-center justify-center" style={{ backgroundColor: pillar.color + '22' }}>
              <Icon className="w-3 h-3" style={{ color: pillar.color }} />
            </div>
            <span className="text-xs font-semibold text-white">Scenario Testing</span>
          </div>
          <span className="text-neutral-700">/</span>
          <span className="text-xs text-neutral-400">{pillar.name}</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex items-center gap-1.5 bg-teal-950/40 border border-teal-900/60 rounded-lg px-2.5 py-1">
            <Sparkles className="w-3 h-3 text-teal-400" />
            <span className="text-[11px] font-semibold text-teal-300">Scenario Modeller</span>
          </div>
        </div>
      </div>

      {/* Three-column layout */}
      <div className="flex flex-1 overflow-hidden">

        {/* LEFT — Scenario picker */}
        <div className="w-64 flex-shrink-0 border-r border-neutral-800/60 flex flex-col overflow-hidden bg-neutral-950">
          <div className="px-4 pt-4 pb-2 flex-shrink-0">
            <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Select scenario</p>
            <p className="text-[11px] text-neutral-600 mt-1">Choose one to model projected impact</p>
          </div>
          <div className="flex-1 overflow-y-auto px-3 pb-4 space-y-2">
            {scenarios.map(s => {
              const isActive = s.id === selectedId;
              return (
                <button key={s.id} onClick={() => setSelectedId(isActive ? null : s.id)}

              {/* OVERVIEW TAB */}
              {detailTab === 'overview' && (

                  {/* Pillar impact */}

                          {getPillarTimeline(campaign).map(function(pt) {

                            <p className="text-sm font-bold text-white">{ch.engagement}</p>
                          </div>
                          <div className="bg-neutral-800/40 rounded-lg p-3">
                            <p className="text-[10px] text-neutral-500 mb-1">Net Sentiment</p>
                            <div className="flex items-center gap-2">
                              <div className="flex-1 h-2 rounded-full overflow-hidden bg-neutral-700">
                                <div className="h-full bg-teal-500 rounded-full" style={{ width: ch.sentiment + '%' }} />
                              </div>
                              <span className={'text-xs font-bold ' + sentColor}>{ch.sentiment}%</span>
                            </div>
                          </div>
                        </div>

                        {/* Channel-specific signals */}
                        <div className="mt-4 pt-3 border-t border-neutral-800">
                          <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-2">Signals from this channel</p>
                          <div className="space-y-1.5">
                            {campaign.keySignals.filter(function(sig, idx) { return idx % campaign.channelPerformance.length === i; }).map(function(sig, j) {
                              return (
                                <div key={j} className="flex items-center gap-2">
                                  <div className={'w-4 h-4 rounded-full flex items-center justify-center ' + (sig.sentiment === 'positive' ? 'bg-teal-950/60 text-teal-400' : 'bg-red-950/60 text-red-400')}>
                                    {sig.sentiment === 'positive' ? <Check className="w-2.5 h-2.5" /> : <AlertCircle className="w-2.5 h-2.5" />}
                                  </div>
                                  <p className="text-[11px] text-neutral-300">{sig.title}</p>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* SIGNALS TAB */}
              {detailTab === 'signals' && (
                <div className="space-y-4">
                  <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5">
                    <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-4">Key Signals {campaign.status === 'projected' ? 'Projected' : 'Generated'}</p>
                    <div className="space-y-3">
                      {campaign.keySignals.map(function(sig, i) {
                        return (
                          <div key={i} className="flex items-start gap-3 bg-neutral-800/30 rounded-lg px-4 py-3">
                            <div className={'w-6 h-6 rounded-full flex-shrink-0 mt-0.5 flex items-center justify-center ' + (sig.sentiment === 'positive' ? 'bg-teal-950/60 text-teal-400' : 'bg-red-950/60 text-red-400')}>
                              {sig.sentiment === 'positive' ? <Check className="w-3 h-3" /> : <AlertCircle className="w-3 h-3" />}
                            </div>
                            <div className="flex-1">
                              <p className="text-xs text-neutral-200 leading-snug">{sig.title}</p>
                              <div className="flex items-center gap-2 mt-1.5">
                                <span className={'text-[9px] font-semibold px-1.5 py-0.5 rounded ' + (sig.sentiment === 'positive' ? 'bg-teal-950/40 text-teal-400' : 'bg-red-950/40 text-red-400')}>
                                  {sig.sentiment === 'positive' ? 'Positive' : 'Negative'}
                                </span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Pillar-by-pillar signal attribution */}
                  <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5">
                    <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-4">Pillar Attribution</p>
                    <p className="text-[11px] text-neutral-600 mb-4">How this campaign's signals distribute across perception pillars</p>
                    <div className="space-y-3">
                      {PILLARS.map(function(p) {
                        var impact = campaign.pillarImpact[p.id] || 0;
                        if (impact === 0) return null;
                        var PIcon = p.icon;
                        var totalImpact = 0;
                        Object.values(campaign.pillarImpact).forEach(function(v) { totalImpact += Math.abs(v); });
                        var pct = totalImpact > 0 ? Math.round(Math.abs(impact) / totalImpact * 100) : 0;
                        return (
                          <div key={p.id} className="flex items-center gap-3">
                            <PIcon className="w-3.5 h-3.5 flex-shrink-0" style={{ color: p.color }} />
                            <span className="text-xs text-neutral-300 w-32 flex-shrink-0">{p.name}</span>
                            <div className="flex-1 h-3 bg-neutral-800 rounded-full overflow-hidden">
                              <div className="h-full rounded-full" style={{ width: pct + '%', backgroundColor: p.color }} />
                            </div>
                            <span className="text-xs font-bold text-neutral-300 w-10 text-right">{pct}%</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}

            </div>
          </div>
        )}
      </div>
    </div>
  );
};

function SisleyNarrativePenetration() {

  const [selectedPillar, setSelectedPillar] = useState(null);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [selectedRegion, setSelectedRegion] = useState(null);
  const [scenarioPillar, setScenarioPillar] = useState(null);

  const handleSelectPillar = (id) => { setSelectedPillar(id); setView('detail'); };
  const handleBack = () => { setView('landing'); setSelectedPillar(null); };
  const handleTestScenario = (pillarId) => { setScenarioPillar(pillarId); setView('scenario'); };
  const handleBackFromScenario = () => { setView('detail'); setScenarioPillar(null); };
  const handleOpenCampaign = () => { setView('campaign'); };
  const handleBackFromCampaign = () => { setView('landing'); };
  const handleSelectProduct = (name) => { setSelectedProduct(name); setView('productDetail'); };
  const handleBackFromProduct = () => { setView('landing'); setSelectedProduct(null); };

  const breadcrumbs = view === 'landing'
    ? ['Modules', 'Narrative Penetration']
    : view === 'productDetail'
    ? ['Modules', 'Narrative Penetration', selectedProduct]
    : view === 'scenario'
    ? ['Modules', 'Narrative Penetration', (PILLARS.find(p => p.id === scenarioPillar) || {}).name, 'Scenario Testing']
    : view === 'campaign'
    ? ['Modules', 'Narrative Penetration', 'Campaign Efficacy']
    : ['Modules', 'Narrative Penetration', (PILLARS.find(p => p.id === selectedPillar) || {}).name];

  return (
    <div className="flex h-screen bg-neutral-50 font-sans text-neutral-900">
      <Sidebar />
      <div className="flex-1 flex flex-col min-w-0">
        {view !== 'scenario' && view !== 'campaign' && <TopBar breadcrumbs={breadcrumbs} />}
        {view === 'landing' && (
          <ModuleLanding
            onSelectPillar={handleSelectPillar}
            onSelectProduct={handleSelectProduct}
            onSelectRegion={setSelectedRegion}
            onTestScenario={handleTestScenario}
            onOpenCampaign={handleOpenCampaign}
          />
        )}
        {view === 'detail' && <PillarDetail pillarId={selectedPillar} onBack={handleBack} onTestScenario={handleTestScenario} />}
        {view === 'scenario' && <ScenarioView pillarId={scenarioPillar} onBack={handleBackFromScenario} />}
        {view === 'campaign' && <CampaignView onBack={handleBackFromCampaign} />}
        {view === 'productDetail' && <ProductDetailView productName={selectedProduct} onBack={handleBackFromProduct} onSelectRegion={setSelectedRegion} />}
      </div>
      {selectedRegion && <RegionModal regionName={selectedRegion} onClose={() => setSelectedRegion(null)} />}
    </div>
  );
}

ReactDOM.render(React.createElement(SisleyNarrativePenetration), document.getElementById('root'));
</script>
</body>
</html>
