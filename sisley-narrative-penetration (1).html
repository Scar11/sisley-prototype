        settings: <svg {...props}><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-13.4 1.4 1.4m10.6 10.6 1.4 1.4"/></svg>,
        "external-link": <svg {...props}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>,
        bot: <svg {...props}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>,
        crosshair: <svg {...props}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>,
        minus: <svg {...props}><path d="M5 12h14"/></svg>,

      return icons[name] || null;

    // ============================================================
    // CHART COMPONENTS
    // ============================================================

    function ScoreRing({ score, size = 120, color }) {
      const c = color || getScoreColor(score).hex;
      const r = (size - 8) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ * (1 - score / 100);
      return (
        <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
          <svg width={size} height={size} className="transform -rotate-90">
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#262626" strokeWidth="4" />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth="4"
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 1s ease-out" }} />
          </svg>
          <div className="absolute flex flex-col items-center">
            <span className="font-serif font-bold text-white" style={{ fontSize: size * 0.3 }}>{score}</span>
            <span className="text-neutral-500" style={{ fontSize: size * 0.09 }}>/ 100</span>
          </div>
        </div>
      );
    }

    function TrendChart({ data, dataKey = "score", height = 180, color = "#2dd4bf", showArea = true }) {
      const [hovered, setHovered] = useState(null);
      const values = data.map(d => d[dataKey]);
      const maxVal = Math.max(...values) + 3;
      const minVal = Math.min(...values) - 3;
      const range = maxVal - minVal || 1;
      const pad = { top: 20, right: 20, bottom: 30, left: 40 };
      const W = 600, H = height;
      const pW = W - pad.left - pad.right, pH = H - pad.top - pad.bottom;

      const pts = data.map((d, i) => ({
        x: pad.left + (i / (data.length - 1)) * pW,
        y: pad.top + (1 - (d[dataKey] - minVal) / range) * pH,
        val: d[dataKey], label: d.month
      }));
      const pathD = smoothPath(pts);
      const areaD = pathD + ` L ${pts[pts.length-1].x} ${pad.top + pH} L ${pts[0].x} ${pad.top + pH} Z`;
      const gradId = `area-${color.replace('#','')}`;

      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ height }} preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.2" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {[0,0.25,0.5,0.75,1].map((f,i) => (
            <line key={i} x1={pad.left} y1={pad.top + f * pH} x2={W - pad.right} y2={pad.top + f * pH} stroke="#1a1a1a" strokeWidth="0.5" />
          ))}
          {showArea && <path d={areaD} fill={`url(#${gradId})`} />}
          <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" />
          {pts.map((p, i) => (
            <g key={i} onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)} style={{ cursor: "pointer" }}>
              <circle cx={p.x} cy={p.y} r={hovered === i ? 5 : 3} fill="#0a0a0a" stroke={color} strokeWidth="2" style={{ transition: "r 0.15s" }} />
              {hovered === i && (
                <g>
                  <rect x={p.x - 28} y={p.y - 28} width="56" height="22" rx="4" fill="#171717" stroke="#333" strokeWidth="0.5" />
                  <text x={p.x} y={p.y - 14} fill="white" fontSize="11" textAnchor="middle" fontFamily="Inter" fontWeight="600">{p.val}</text>
                </g>
              )}
            </g>
          ))}
          {data.map((d, i) => (
            i % 2 === 0 && <text key={i} x={pts[i].x} y={H - 6} fill="#525252" fontSize="9" textAnchor="middle" fontFamily="Inter">{d.month}</text>
          ))}
          {[0,0.5,1].map((f,i) => (
            <text key={i} x={pad.left - 8} y={pad.top + f * pH + 4} fill="#525252" fontSize="9" textAnchor="end" fontFamily="Inter">{Math.round(maxVal - f * range)}</text>
          ))}
        </svg>
      );
    }

    function BarList({ items, maxValue = 100, colorFn, height = 6 }) {
      return (
        <div className="space-y-3">
          {items.map((item, i) => {
            const c = colorFn ? colorFn(item) : getScoreColor(item.value || item.score).hex;
            const val = item.value || item.score || item.pct || 0;
            return (

        </div>
      );
    }

                        <div className="flex items-center justify-between mt-1">
                          <span className="text-xs text-neutral-500">{prod.category}</span>
                          <span className={`text-xs px-1.5 py-0.5 rounded ${getScoreColor(prod.score).bg} ${getScoreColor(prod.score).text}`}>{getScoreLabel(prod.score)}</span>
                        </div>
                      </div>
                      <Icon name="chevron-right" size={14} color="#525252" />
                    </div>
                  </Card>
                ))}
              </div>
            </div>

            {/* Marketing Claim Penetration */}
            <div>
              <SectionHeader title="Marketing Claim Penetration" icon="crosshair" />
              <div className="space-y-3 max-h-[480px] overflow-y-auto pr-1">
                {MARKETING_CLAIMS.map(claim => (
                  <ClaimCard key={claim.id} claim={claim} compact />
                ))}
              </div>
            </div>
          </div>

          {/* Globe + Regions */}
          <div className="grid grid-cols-3 gap-5">
            <Card className="flex items-center justify-center">
              <GlobeViz regions={REGIONS} onSelectRegion={onSelectRegion} />
            </Card>
            <Card className="col-span-2">
              <SectionHeader title="Regional Perception" icon="globe" />
              <BarList items={REGIONS.map(r => ({ name: `${r.name}  (${r.trend > 0 ? '+' : ''}${r.trend})`, value: r.score }))} maxValue={100} height={8} />
              <div className="mt-4 grid grid-cols-5 gap-2">
                {REGIONS.map(r => (
                  <button key={r.name} onClick={() => onSelectRegion(r.name)}
                    className="text-center p-2 rounded-lg bg-neutral-800/40 hover:bg-neutral-800/80 transition-colors">
                    <p className="font-serif text-lg font-bold text-white">{r.score}</p>
                    <p className="text-xs text-neutral-500 mt-0.5">{r.name}</p>
                  </button>
                ))}
              </div>
            </Card>
          </div>
        </div>
      );
    }

    // ============================================================
    // PILLAR DETAIL
    // ============================================================

    function PillarDetail({ pillarId, onBack, onTestScenario }) {
      const pillar = PILLARS.find(p => p.id === pillarId);
      if (!pillar) return null;
      const trend = PILLAR_TRENDS[pillarId] || [];
      const signals = PILLAR_SIGNALS[pillarId] || [];
      const demos = PILLAR_DEMOGRAPHICS[pillarId] || [];
      const comps = PILLAR_COMPETITORS[pillarId] || [];
      const sov = PILLAR_SOV[pillarId] || [];
      const narrative = AI_NARRATIVES[pillarId] || "";
      const claims = MARKETING_CLAIMS.filter(c => c.pillar === pillarId);

      return (
        <div className="space-y-5 animate-fade-in">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-4">
              <button onClick={() => onBack("landing")} className="text-neutral-500 hover:text-neutral-300 transition-colors">
                <Icon name="arrow-left" size={18} />
              </button>
              <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: pillar.color + "20" }}>
                <Icon name={pillar.icon} size={18} color={pillar.color} />
              </div>
              <div>
                <h1 className="font-serif text-xl font-bold text-white">{pillar.name}</h1>
                <p className="text-xs text-neutral-500">{pillar.weight}% of overall perception score</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-right">
                <span className="font-serif text-3xl font-bold text-white">{pillar.score}</span>
                <span className="text-neutral-500 text-sm ml-1">/ 100</span>
              </div>
              <div className="flex flex-col items-end gap-1">
                <span className={`text-xs px-2 py-0.5 rounded-full ${getScoreColor(pillar.score).bg} ${getScoreColor(pillar.score).text}`}>{getScoreLabel(pillar.score)}</span>
                <TrendIndicator trend={pillar.trend} />
              </div>
              <button onClick={() => onTestScenario(pillarId)} className="ml-4 px-4 py-2 rounded-lg bg-teal-950/40 border border-teal-800/30 text-teal-400 text-xs font-medium hover:bg-teal-950/60 transition-colors flex items-center gap-1.5">
                <Icon name="zap" size={12} color="#2dd4bf" /> Test Scenario
              </button>
            </div>
          </div>

          {/* AI Narrative */}
          <Card className="border-l-2" style={{ borderLeftColor: pillar.color + "66" }}>
            <div className="flex items-start gap-3">
              <Icon name="sparkles" size={14} color={pillar.color} />
              <p className="text-sm text-neutral-400 leading-relaxed">{narrative}</p>
            </div>
          </Card>

          {/* Trend */}
          <Card>
            <SectionHeader title="12-Month Trend" icon="activity" />
            <TrendChart data={trend} color={pillar.color} height={180} />
          </Card>

          {/* Demographics + Competitors + SoV */}
          <div className="grid grid-cols-3 gap-5">
            <Card>
              <SectionHeader title="Demographic Perception" icon="users" />
              <BarList items={demos.map(d => ({ name: d.name, value: d.score }))} maxValue={100} />
            </Card>
            <Card>
              <SectionHeader title="Competitive Benchmark" icon="radar" />
              <BarList items={comps.map(c => ({ name: c.name, value: c.score, color: c.name === "Sisley" ? pillar.color : "#525252" }))} maxValue={100}
                colorFn={item => item.color || "#525252"} />
            </Card>
            <Card>
              <SectionHeader title="Share of Voice" icon="activity" />
              <BarList items={sov.map(s => ({ name: s.name, value: s.pct, pct: s.pct }))} maxValue={40}
                colorFn={() => pillar.color} />
            </Card>
          </div>

          {/* Claims */}
          {claims.length > 0 && (
            <div>
              <SectionHeader title="Marketing Claim Penetration" icon="crosshair" />
              <div className="grid grid-cols-2 gap-3">
                {claims.map((c, i) => (
                  <ClaimCard key={i} claim={c} showBreakdown />
                ))}
              </div>
            </div>
          )}

          {/* Signals */}
          <Card>
            <SectionHeader title="Key Signals" icon="activity" />
            {signals.map((s, i) => <SignalCard key={i} signal={s} />)}
          </Card>
        </div>
      );
    }

    // ============================================================
    // PRODUCT DETAIL
    // ============================================================

    function ProductDetail({ productName, onBack }) {
      const prod = PRODUCT_LINES.find(p => p.name === productName);
      if (!prod) return null;
      const narrative = PRODUCT_NARRATIVES[productName] || "";
      const trend = PRODUCT_TRENDS[productName] || [];
      const pillarScores = PRODUCT_PILLAR_SCORES[productName] || {};
      const geoScores = PRODUCT_GEO_SCORES[productName] || {};
      const demoScores = PRODUCT_DEMO_SCORES[productName] || {};
      const signals = PRODUCT_SIGNALS[productName] || [];
      const claims = PRODUCT_CLAIMS[productName] || [];
      const prodColor = PRODUCT_COLORS[productName] || "#2dd4bf";

      const pillarItems = PILLARS.map(p => ({ name: p.name, value: pillarScores[p.id] || 0, color: p.color }));
      const geoItems = Object.entries(geoScores).map(([k,v]) => ({ name: k, value: v }));
      const demoItems = Object.entries(demoScores).map(([k,v]) => ({ name: k, value: v }));

      return (
        <div className="space-y-5 animate-fade-in">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-4">
              <button onClick={() => onBack("landing")} className="text-neutral-500 hover:text-neutral-300 transition-colors">
                <Icon name="arrow-left" size={18} />
              </button>
              <div className="w-1.5 h-10 rounded-full" style={{ background: prodColor }} />
              <div>
                <h1 className="font-serif text-xl font-bold text-white">{productName}</h1>
                <p className="text-xs text-neutral-500">{prod.category}</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-right">
                <span className="font-serif text-3xl font-bold text-white">{prod.score}</span>
                <span className="text-neutral-500 text-sm ml-1">/ 100</span>
              </div>
              <div className="flex flex-col items-end gap-1">
                <span className={`text-xs px-2 py-0.5 rounded-full ${getScoreColor(prod.score).bg} ${getScoreColor(prod.score).text}`}>{getScoreLabel(prod.score)}</span>
                <TrendIndicator trend={prod.trend} />
              </div>
            </div>
          </div>

          {/* AI Narrative + Trend */}
          <div className="grid grid-cols-3 gap-5">
            <Card className="border-l-2" style={{ borderLeftColor: prodColor + "66" }}>
              <div className="flex items-start gap-2 mb-2">
                <Icon name="sparkles" size={14} color={prodColor} />
                <p className="text-xs font-medium uppercase tracking-wider" style={{ color: prodColor }}>AI Analysis</p>
              </div>
              <p className="text-sm text-neutral-400 leading-relaxed">{narrative}</p>
            </Card>
            <Card className="col-span-2">
              <SectionHeader title="12-Month Product Trend" icon="activity" />
              <TrendChart data={trend} color={prodColor} height={160} />
            </Card>
          </div>

          {/* Pillar Breakdown + Geography + Demographics */}
          <div className="grid grid-cols-3 gap-5">
            <Card>
              <SectionHeader title="Perception Across Pillars" icon="layers" />
              <BarList items={pillarItems} maxValue={100} colorFn={item => item.color} />
            </Card>
            <Card>
              <SectionHeader title="Geographic Performance" icon="globe" />
              <BarList items={geoItems} maxValue={100} />
            </Card>
            <Card>
              <SectionHeader title="Demographic Resonance" icon="users" />
              <BarList items={demoItems} maxValue={100} />
            </Card>
          </div>

          {/* Claims */}
          {claims.length > 0 && (
            <div>
              <SectionHeader title="Product Claim Penetration" icon="crosshair" />
              <div className="grid grid-cols-2 gap-3">
                {claims.map((c, i) => (
                  <ClaimCard key={i} claim={c} showBreakdown />
                ))}
              </div>
            </div>
          )}

          {/* Signals */}
          <Card>
            <SectionHeader title="Key Signals" icon="activity" />
            {signals.map((s, i) => <SignalCard key={i} signal={s} />)}
          </Card>
        </div>
      );
    }

    // ============================================================
    // REGION MODAL
    // ============================================================

    function RegionModal({ regionName, onClose }) {
      const region = REGIONS.find(r => r.name === regionName);
      const detail = REGION_DETAILS[regionName];
      if (!region || !detail) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-neutral-900 border border-neutral-700 rounded-2xl w-full max-w-lg p-6 shadow-2xl animate-fade-in" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="font-serif text-lg font-bold text-white">{regionName}</h2>
                <div className="flex items-center gap-2 mt-1">
                  <span className="font-serif text-2xl font-bold" style={{ color: getScoreColor(region.score).hex }}>{region.score}</span>
                  <TrendIndicator trend={region.trend} />
                  <span className={`text-xs px-2 py-0.5 rounded-full ${getScoreColor(region.score).bg} ${getScoreColor(region.score).text}`}>{getScoreLabel(region.score)}</span>
                </div>
              </div>
              <button onClick={onClose} className="text-neutral-500 hover:text-neutral-300 transition-colors">
                <Icon name="x" size={18} />
              </button>
            </div>
            <p className="text-sm text-neutral-400 leading-relaxed mb-4">{detail.summary}</p>
            <div className="border-t border-neutral-800 pt-4">
              <p className="text-xs text-neutral-500 uppercase tracking-wider mb-3">Key Signals</p>
              {detail.signals.map((s, i) => <SignalCard key={i} signal={s} />)}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SCENARIO VIEW
    // ============================================================

    function ScenarioView({ initialPillar, onBack }) {
      const [selectedPillar, setSelectedPillar] = useState(initialPillar || "efficacy");
      const [selectedScenario, setSelectedScenario] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingStep, setLoadingStep] = useState(0);
      const [results, setResults] = useState(null);

      const loadingSteps = [
        "Analyzing narrative landscape...",
        "Modeling pillar impacts...",
        "Calculating projected outcomes...",
        "Generating recommendations..."
      ];

      function runScenario(scenario) {
        setSelectedScenario(scenario);
        setLoading(true);
        setLoadingStep(0);
        setResults(null);

        let step = 0;
        const interval = setInterval(() => {
          step++;
          if (step < loadingSteps.length) {
            setLoadingStep(step);
          } else {
            clearInterval(interval);
            setLoading(false);
            // Calculate projected scores
            const projected = {};
            let totalImpact = 0;
            PILLARS.forEach(p => {
              const imp = scenario.impact[p.id] || 0;
              projected[p.id] = { current: p.score, projected: Math.min(100, p.score + imp), impact: imp };
              totalImpact += imp * (p.weight / 100);
            });
            setResults({ scenario, projected, newOverall: Math.round(OVERALL_SCORE + totalImpact) });
          }
        }, 600);
      }

      const scenarios = SCENARIOS[selectedPillar] || [];

      return (
        <div className="space-y-5 animate-fade-in">
          <div className="flex items-center gap-4">
            <button onClick={() => onBack("landing")} className="text-neutral-500 hover:text-neutral-300 transition-colors">
              <Icon name="arrow-left" size={18} />
            </button>
            <div>
              <h1 className="font-serif text-xl font-bold text-white">Scenario Testing</h1>
              <p className="text-xs text-neutral-500">Model projected perception impacts</p>
            </div>
          </div>

          {/* Pillar tabs */}
          <div className="flex gap-2">
            {PILLARS.map(p => (
              <button key={p.id} onClick={() => { setSelectedPillar(p.id); setSelectedScenario(null); setResults(null); }}
                className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${selectedPillar === p.id ? 'text-white' : 'text-neutral-500 hover:text-neutral-400'}`}
                style={selectedPillar === p.id ? { background: p.color + "20", border: `1px solid ${p.color}44`, color: p.color } : { border: "1px solid transparent" }}>
                {p.name}
              </button>
            ))}
          </div>

          <div className="grid grid-cols-2 gap-5">
            {/* Scenario list */}
            <div className="space-y-3">
              {scenarios.map(s => (
                <Card key={s.id} hover onClick={() => runScenario(s)}
                  className={`!p-4 ${selectedScenario?.id === s.id ? 'border-teal-700/50' : ''}`}>
                  <div className="flex items-start justify-between mb-2">
                    <h4 className="text-sm font-semibold text-neutral-200">{s.title}</h4>
                    <span className={`text-xs px-2 py-0.5 rounded-full ${s.priority === 'high' ? 'bg-amber-950/40 text-amber-400 border border-amber-800/30' : 'bg-neutral-800 text-neutral-400 border border-neutral-700'}`}>
                      {s.priority}
                    </span>
                  </div>
                  <p className="text-xs text-neutral-500 leading-relaxed">{s.desc}</p>
                  <div className="mt-3 flex gap-1.5 flex-wrap">
                    {PILLARS.map(p => {
                      const imp = s.impact[p.id];
                      if (imp === 0) return null;
                      return (
                        <span key={p.id} className="text-xs px-1.5 py-0.5 rounded" style={{ background: p.color + "15", color: p.color }}>
                          {p.name.split(' ')[0]} {imp > 0 ? '+' : ''}{imp}
                        </span>
                      );
                    })}
                  </div>
                </Card>
              ))}
            </div>

            {/* Results panel */}
            <div>
              {loading && (
                <Card className="flex flex-col items-center justify-center py-12">
                  <div className="w-10 h-10 border-2 border-teal-400/30 border-t-teal-400 rounded-full animate-spin mb-4" />
                  <p className="text-sm text-teal-400 mb-2">{loadingSteps[loadingStep]}</p>
                  <div className="flex gap-1 mt-2">
                    {loadingSteps.map((_, i) => (
                      <div key={i} className={`w-2 h-2 rounded-full transition-colors ${i <= loadingStep ? 'bg-teal-400' : 'bg-neutral-700'}`} />
                    ))}
                  </div>
                </Card>
              )}
              {results && !loading && (
                <Card className="animate-fade-in">
                  <h3 className="font-serif text-lg font-semibold text-white mb-1">{results.scenario.title}</h3>
                  <p className="text-xs text-neutral-500 mb-4">Projected impact analysis</p>

                  <div className="flex items-center gap-6 mb-5 p-4 rounded-xl bg-neutral-800/40">
                    <div className="text-center">
                      <p className="text-xs text-neutral-500 mb-1">Current</p>
                      <p className="font-serif text-2xl font-bold text-neutral-400">{OVERALL_SCORE}</p>
                    </div>
                    <div className="text-2xl text-neutral-600">→</div>
                    <div className="text-center">
                      <p className="text-xs text-teal-400 mb-1">Projected</p>
                      <p className="font-serif text-2xl font-bold text-teal-400">{results.newOverall}</p>
                    </div>
                    <div className="text-center ml-auto">
                      <p className="text-xs text-neutral-500 mb-1">Impact</p>
                      <p className="font-serif text-xl font-bold text-emerald-400">+{results.newOverall - OVERALL_SCORE}</p>
                    </div>
                  </div>

                  <p className="text-xs text-neutral-500 uppercase tracking-wider mb-3">Pillar-by-Pillar Impact</p>
                  <div className="space-y-3">
                    {PILLARS.map(p => {
                      const r = results.projected[p.id];
                      return (
                        <div key={p.id}>
                          <div className="flex items-center justify-between text-xs mb-1">
                            <span className="text-neutral-400">{p.name}</span>
                            <span>
                              <span className="text-neutral-500">{r.current}</span>
                              <span className="text-neutral-600 mx-1">→</span>
                              <span className="text-white font-medium">{r.projected}</span>
                              {r.impact !== 0 && (
                                <span className={`ml-1 ${r.impact > 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                  ({r.impact > 0 ? '+' : ''}{r.impact})
                                </span>
                              )}
                            </span>
                          </div>
                          <div className="h-2 bg-neutral-800 rounded-full overflow-hidden relative">
                            <div className="h-full rounded-full absolute" style={{ width: `${r.current}%`, background: "#525252" }} />
                            <div className="h-full rounded-full absolute animate-bar" style={{ width: `${r.projected}%`, background: p.color }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}
              {!loading && !results && (
                <Card className="flex flex-col items-center justify-center py-16 text-center">
                  <Icon name="zap" size={32} color="#525252" />
                  <p className="text-sm text-neutral-500 mt-3">Select a scenario to model its projected impact on brand perception</p>
                </Card>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // APP ROOT
    // ============================================================

    function App() {
      const [view, setView] = useState("landing"); // landing | pillar | product | scenario
      const [selectedPillar, setSelectedPillar] = useState(null);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [selectedRegion, setSelectedRegion] = useState(null);
      const [scenarioPillar, setScenarioPillar] = useState(null);

      function handleSelectPillar(id) { setSelectedPillar(id); setView("pillar"); }
      function handleSelectProduct(name) { setSelectedProduct(name); setView("product"); }
      function handleSelectRegion(name) { setSelectedRegion(name); }
      function handleTestScenario(pillarId) { setScenarioPillar(pillarId); setView("scenario"); }
      function handleBack(target) { setView(target || "landing"); setSelectedRegion(null); }

      const pillarName = selectedPillar ? PILLARS.find(p => p.id === selectedPillar)?.name : null;

      return (
        <div className="flex h-screen bg-[#0a0a0a] text-white font-sans">
          <Sidebar view={view} onNavigate={handleBack} />
          <div className="flex-1 flex flex-col min-w-0">
            <HeaderBar view={view} pillarName={pillarName} productName={selectedProduct} onBack={handleBack} />
            <main className="flex-1 overflow-y-auto p-6">
              <div className="max-w-7xl mx-auto">
                {view === "landing" && (
                  <LandingPage
                    onSelectPillar={handleSelectPillar}
                    onSelectProduct={handleSelectProduct}
                    onSelectRegion={handleSelectRegion}
                    onTestScenario={handleTestScenario}
                  />
                )}
                {view === "pillar" && (
                  <PillarDetail pillarId={selectedPillar} onBack={handleBack} onTestScenario={handleTestScenario} />
                )}
                {view === "product" && (
                  <ProductDetail productName={selectedProduct} onBack={handleBack} />
                )}
                {view === "scenario" && (
                  <ScenarioView initialPillar={scenarioPillar} onBack={handleBack} />
                )}
              </div>
            </main>
          </div>
          {selectedRegion && <RegionModal regionName={selectedRegion} onClose={() => setSelectedRegion(null)} />}
        </div>
      );
    }

    // ============================================================
    // RENDER
    // ============================================================

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
</html>
