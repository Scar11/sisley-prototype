    function smoothPath(points) {
      if (points.length < 2) return "";
      let d = `M ${points[0].x} ${points[0].y}`;
      for (let i = 1; i < points.length; i++) {
        const t = 0.3;
        const cp1x = points[i-1].x + (points[i].x - points[i-1].x) * t;
        const cp2x = points[i].x - (points[i].x - points[i-1].x) * t;
        d += ` C ${cp1x} ${points[i-1].y}, ${cp2x} ${points[i].y}, ${points[i].x} ${points[i].y}`;

      return d;
    }

      const c = color || getScoreColor(score).hex;
      const r = (size - 8) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ * (1 - score / 100);
      return (
        <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
          <svg width={size} height={size} className="transform -rotate-90">
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#262626" strokeWidth="4" />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth="4"
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 1s ease-out" }} />
          </svg>
          <div className="absolute flex flex-col items-center">
            <span className="font-serif font-bold text-white" style={{ fontSize: size * 0.3 }}>{score}</span>
            <span className="text-neutral-500" style={{ fontSize: size * 0.09 }}>/ 100</span>
          </div>
        </div>
      );
    }

    function TrendChart({ data, dataKey = "score", height = 180, color = "#2dd4bf", showArea = true }) {
      const [hovered, setHovered] = useState(null);
      const values = data.map(d => d[dataKey]);
      const maxVal = Math.max(...values) + 3;
      const minVal = Math.min(...values) - 3;
      const range = maxVal - minVal || 1;
      const pad = { top: 20, right: 20, bottom: 30, left: 40 };
      const W = 600, H = height;
      const pW = W - pad.left - pad.right, pH = H - pad.top - pad.bottom;

      const pts = data.map((d, i) => ({
        x: pad.left + (i / (data.length - 1)) * pW,
        y: pad.top + (1 - (d[dataKey] - minVal) / range) * pH,
        val: d[dataKey], label: d.month
      }));
      const pathD = smoothPath(pts);
      const areaD = pathD + ` L ${pts[pts.length-1].x} ${pad.top + pH} L ${pts[0].x} ${pad.top + pH} Z`;
      const gradId = `area-${color.replace('#','')}`;

      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ height }} preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.2" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {[0,0.25,0.5,0.75,1].map((f,i) => (
            <line key={i} x1={pad.left} y1={pad.top + f * pH} x2={W - pad.right} y2={pad.top + f * pH} stroke="#1a1a1a" strokeWidth="0.5" />
          ))}
          {showArea && <path d={areaD} fill={`url(#${gradId})`} />}
          <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" />
          {pts.map((p, i) => (
            <g key={i} onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)} style={{ cursor: "pointer" }}>
              <circle cx={p.x} cy={p.y} r={hovered === i ? 5 : 3} fill="#0a0a0a" stroke={color} strokeWidth="2" style={{ transition: "r 0.15s" }} />
              {hovered === i && (
                <g>
                  <rect x={p.x - 28} y={p.y - 28} width="56" height="22" rx="4" fill="#171717" stroke="#333" strokeWidth="0.5" />
                  <text x={p.x} y={p.y - 14} fill="white" fontSize="11" textAnchor="middle" fontFamily="Inter" fontWeight="600">{p.val}</text>
                </g>
              )}
            </g>
          ))}
          {data.map((d, i) => (
            i % 2 === 0 && <text key={i} x={pts[i].x} y={H - 6} fill="#525252" fontSize="9" textAnchor="middle" fontFamily="Inter">{d.month}</text>
          ))}
          {[0,0.5,1].map((f,i) => (
            <text key={i} x={pad.left - 8} y={pad.top + f * pH + 4} fill="#525252" fontSize="9" textAnchor="end" fontFamily="Inter">{Math.round(maxVal - f * range)}</text>
          ))}
        </svg>
      );
    }

    function BarList({ items, maxValue = 100, colorFn, height = 6 }) {
      return (
        <div className="space-y-3">
          {items.map((item, i) => {
            const c = colorFn ? colorFn(item) : getScoreColor(item.value || item.score).hex;
            const val = item.value || item.score || item.pct || 0;
            return (
              <div key={i}>
                <div className="flex justify-between text-xs mb-1">
                  <span className="text-neutral-400">{item.name}</span>
                  <span className="text-neutral-300 font-medium">{val}{item.pct !== undefined ? "%" : ""}</span>
                </div>
                <div className="bg-neutral-800 rounded-full overflow-hidden" style={{ height }}>
                  <div className="h-full rounded-full animate-bar" style={{ width: `${(val / maxValue) * 100}%`, background: c }} />
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ============================================================
    // SMALL UI COMPONENTS
    // ============================================================

    function TrendIndicator({ trend, size = "sm" }) {
      if (trend === 0) return <span className="text-neutral-500 text-xs">—</span>;
      const isUp = trend > 0;
      const sz = size === "lg" ? 16 : 12;
      return (
        <span className={`inline-flex items-center gap-0.5 ${isUp ? 'text-emerald-400' : 'text-red-400'} ${size === "lg" ? 'text-sm' : 'text-xs'}`}>
          <Icon name={isUp ? "trending-up" : "trending-down"} size={sz} />
          <span className="font-medium">{isUp ? "+" : ""}{trend}</span>
        </span>
      );
    }

    function Card({ children, className = "", onClick, hover = false }) {
      return (
        <div onClick={onClick}
          className={`bg-neutral-900/90 border border-neutral-800 rounded-xl p-5 ${hover ? 'cursor-pointer hover:border-neutral-700 hover:shadow-lg hover:shadow-neutral-900/50 transition-all duration-200' : ''} ${className}`}>
          {children}
        </div>
      );
    }

    function SectionHeader({ title, icon, rightContent }) {
      return (
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2 border-l-2 border-amber-700/40 pl-3">
            {icon && <span className="text-neutral-500"><Icon name={icon} size={14} /></span>}
            <h3 className="text-xs font-semibold text-neutral-400 uppercase tracking-widest">{title}</h3>
          </div>
          {rightContent}
        </div>
      );
    }

    function PillarChip({ pillarId }) {
      const p = PILLARS.find(x => x.id === pillarId);
      if (!p) return null;
      return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs" style={{ background: p.color + "15", color: p.color, border: `1px solid ${p.color}33` }}>
          <Icon name={p.icon} size={10} color={p.color} />{p.name}
        </span>
      );
    }

    function SignalCard({ signal }) {
      const isPos = signal.sentiment === "positive";
      return (
        <div className="flex items-start gap-3 py-3 border-b border-neutral-800/50 last:border-0">
          <div className={`mt-1 w-2 h-2 rounded-full flex-shrink-0 ${isPos ? 'bg-emerald-400' : 'bg-red-400'}`} />
          <div className="flex-1 min-w-0">
            <p className="text-sm text-neutral-300 leading-relaxed">{signal.title}</p>
            <div className="flex items-center gap-3 mt-1.5 text-xs text-neutral-500">
              <span>{signal.source}</span>
              <span>{signal.date}</span>
              {signal.relevance && <span className="text-neutral-600">Relevance: {signal.relevance}</span>}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // CLAIM CARD
    // ============================================================

    function ClaimCard({ claim, compact = false, showBreakdown = false }) {
      const [expanded, setExpanded] = useState(false);
      const c = claim.penetrated ? "#10b981" : "#ef4444";
      const pillar = PILLARS.find(p => p.id === claim.pillar);

      return (
        <div className="bg-neutral-900/60 border border-neutral-800/60 rounded-lg p-4 hover:border-neutral-700/60 transition-colors">
          <p className="font-serif text-neutral-200 text-sm leading-relaxed mb-3">"{claim.claim}"</p>
          <div className="flex items-center gap-3 mb-2">
            <div className="flex-1 bg-neutral-800 rounded-full h-2 overflow-hidden">
              <div className="h-full rounded-full animate-bar" style={{ width: `${claim.score}%`, background: c }} />
            </div>
            <span className="text-sm font-semibold text-neutral-200 w-8 text-right">{claim.score}</span>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${claim.penetrated ? 'bg-emerald-950/50 text-emerald-400 border border-emerald-800/30' : 'bg-red-950/50 text-red-400 border border-red-800/30'}`}>
              <Icon name={claim.penetrated ? "check" : "minus"} size={10} />
              {claim.penetrated ? "Penetrating" : "Not Penetrating"}
            </span>
            <TrendIndicator trend={claim.trend} />
            {pillar && <PillarChip pillarId={claim.pillar} />}
          </div>
          {(showBreakdown || expanded) && claim.geo && (
            <div className="mt-4 pt-3 border-t border-neutral-800/50 grid grid-cols-2 gap-4">
              <div>
                <p className="text-xs text-neutral-500 mb-2 uppercase tracking-wider">Geographic Penetration</p>
                <BarList items={Object.entries(claim.geo).map(([k,v]) => ({ name: k, value: v }))} maxValue={100} height={4}
                  colorFn={(item) => item.value >= 60 ? "#10b981" : "#ef4444"} />
              </div>
              <div>
                <p className="text-xs text-neutral-500 mb-2 uppercase tracking-wider">Demographic Resonance</p>
                <BarList items={Object.entries(claim.demo).map(([k,v]) => ({ name: k, value: v }))} maxValue={100} height={4}
                  colorFn={(item) => item.value >= 60 ? "#10b981" : "#ef4444"} />
              </div>
            </div>
          )}
          {!compact && !showBreakdown && claim.geo && (
            <button onClick={() => setExpanded(!expanded)} className="mt-2 text-xs text-neutral-500 hover:text-neutral-300 transition-colors">
              {expanded ? "Hide breakdown" : "Show breakdown"}
            </button>
          )}
        </div>
      );
    }

    // ============================================================
    // CHATBOT PERCEPTION SECTION
    // ============================================================

    function ChatbotPerceptionSection({ level = "global", pillarId, productName }) {
      const [activeBot, setActiveBot] = useState("chatgpt");
      const activeData = CHATBOT_BRAND_PERCEPTION[activeBot];

      // Compute context-specific data
      const getBotScore = (botId) => {
        if (level === "pillar" && pillarId) {
          return CHATBOT_PILLAR_PERCEPTION[pillarId]?.[botId]?.score || 0;
        }
        return CHATBOT_BRAND_PERCEPTION[botId]?.overallScore || 0;
      };

      const getBotRank = (botId) => {
        if (level === "product" && productName) {
          return CHATBOT_PRODUCT_PERCEPTION[productName]?.[botId]?.rank || "-";
        }
        return CHATBOT_BRAND_PERCEPTION[botId]?.recommendationRank || "-";
      };

      const getSentimentColor = (sentiment) => {
        if (sentiment === "positive") return "bg-emerald-400";
        if (sentiment === "mixed" || sentiment === "cautious") return "bg-amber-400";
        return "bg-red-400";
      };

      const getSentimentLabel = (sentiment) => {
        if (sentiment === "positive") return "Positive";
        if (sentiment === "mixed") return "Mixed";
        if (sentiment === "cautious") return "Cautious";
        return "Neutral";
      };

      const getBotSentiment = (botId) => {
        if (level === "product" && productName) {
          return CHATBOT_PRODUCT_PERCEPTION[productName]?.[botId]?.sentiment || "neutral";
        }
        return CHATBOT_BRAND_PERCEPTION[botId]?.sentiment || "neutral";
      };

      const getSnippet = (botId) => {
        if (level === "product" && productName) {
          const pd = CHATBOT_PRODUCT_PERCEPTION[productName]?.[botId];
          return { query: `Best ${PRODUCT_LINES.find(p=>p.name===productName)?.category?.toLowerCase() || 'luxury skincare'} products?`, snippet: pd?.snippet || "" };
        }
        if (level === "pillar" && pillarId) {
          const pillar = PILLARS.find(p => p.id === pillarId);
          const pp = CHATBOT_PILLAR_PERCEPTION[pillarId]?.[botId];
          return { query: `How does On Running perform on ${pillar?.name?.toLowerCase()}?`, snippet: `Alignment: ${pp?.alignment || "unknown"}. Key phrases used: ${(pp?.phrases || []).map(p => '"' + p + '"').join(", ") || "none detected"}.` };
        }
        const bd = CHATBOT_BRAND_PERCEPTION[botId];
        return { query: bd?.sampleQuery || "", snippet: bd?.sampleSnippet || "" };
      };

      const getStrengths = (botId) => {
        if (level === "product" && productName) {
          const pd = CHATBOT_PRODUCT_PERCEPTION[productName]?.[botId];
          return { strengths: pd?.mentioned ? ["Proactively mentioned", `Ranked #${pd.rank} in category`] : [], concerns: pd?.competitorsRankedAbove?.map(c => `${c} ranked higher`) || [] };
        }
        if (level === "pillar" && pillarId) {
          const pp = CHATBOT_PILLAR_PERCEPTION[pillarId]?.[botId];
          const alignment = pp?.alignment || "unknown";
          const strengths = alignment === "strong" ? ["Strong narrative alignment", ...(pp?.phrases?.slice(0, 2) || []).map(p => `Uses "${p}"`)] : alignment === "moderate" ? ["Moderate alignment"] : [];
          const concerns = alignment === "weak" ? ["Weak narrative reflection"] : alignment === "absent" ? ["Pillar not reflected in responses"] : [];
          return { strengths, concerns };
        }
        const bd = CHATBOT_BRAND_PERCEPTION[botId];
        return { strengths: bd?.strengths || [], concerns: bd?.concerns || [] };
      };

      const activeSC = getStrengths(activeBot);
      const activeSnippet = getSnippet(activeBot);

      return (
        <div>
          <SectionHeader title="Chatbot Perception Analysis" icon="bot"
            rightContent={<span className="text-xs text-neutral-600 font-normal normal-case tracking-normal">How AI assistants perceive and recommend On Running</span>} />

          {/* Chatbot Score Cards */}
          <div className="grid grid-cols-4 gap-3 mb-4">
            {CHATBOTS.map(bot => {
              const score = getBotScore(bot.id);
              const rank = getBotRank(bot.id);
              const sentiment = getBotSentiment(bot.id);
              const isActive = activeBot === bot.id;
              return (
                <Card key={bot.id} hover onClick={() => setActiveBot(bot.id)}
                  className={`!p-4 transition-all ${isActive ? 'ring-1' : ''}`}
                  style={isActive ? { borderColor: bot.color + "66", boxShadow: `0 0 20px ${bot.color}10` } : {}}>
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2">
                      <div className="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold" style={{ background: bot.color + "18", color: bot.color, border: `1px solid ${bot.color}30` }}>
                        {bot.name[0]}
                      </div>
                      <div>
                        <p className="text-sm font-semibold text-neutral-200">{bot.name}</p>
                        <p className="text-xs text-neutral-600">{bot.model}</p>
                      </div>
                    </div>
                    <div className={`w-2 h-2 rounded-full ${getSentimentColor(sentiment)}`} title={getSentimentLabel(sentiment)} />
                  </div>
                  <div className="flex items-end justify-between">
                    <div>
                      <p className="font-serif text-2xl font-bold text-white">{score}</p>
                      <p className="text-xs text-neutral-600">perception</p>
                    </div>
                    <div className="text-right">
                      <p className="text-lg font-bold" style={{ color: bot.color }}>#{rank}</p>
                      <p className="text-xs text-neutral-600">{level === "product" ? "category" : "rec. rank"}</p>
                    </div>
                  </div>
                  <div className="mt-2 bg-neutral-800 rounded-full h-1.5 overflow-hidden">
                    <div className="h-full rounded-full animate-bar" style={{ width: `${score}%`, background: bot.color }} />
                  </div>
                </Card>
              );
            })}
          </div>

          {/* Sample Response + Strengths/Concerns */}
          <div className="grid grid-cols-3 gap-4">
            {/* Sample Response */}
            <Card className="col-span-2">
              <div className="flex items-center gap-2 mb-3">
                <Icon name="message-circle" size={14} color={CHATBOTS.find(b=>b.id===activeBot)?.color} />
                <p className="text-xs font-medium uppercase tracking-wider" style={{ color: CHATBOTS.find(b=>b.id===activeBot)?.color }}>
                  {CHATBOTS.find(b=>b.id===activeBot)?.name} Response
                </p>
                <div className="flex gap-1 ml-auto">
                  {CHATBOTS.map(b => (
                    <button key={b.id} onClick={() => setActiveBot(b.id)}
                      className={`w-6 h-6 rounded text-xs font-bold transition-all ${activeBot === b.id ? 'ring-1 ring-offset-1 ring-offset-neutral-900' : 'opacity-40 hover:opacity-70'}`}
                      style={{ background: b.color + "20", color: b.color, ringColor: b.color }}>
                      {b.name[0]}
                    </button>
                  ))}
                </div>
              </div>
              <div className="bg-neutral-950 rounded-xl p-4 border border-neutral-800/50">
                <p className="font-serif text-sm text-neutral-400 mb-3">
                  "{activeSnippet.query}"
                </p>
                <div className="pl-3 border-l-2 border-neutral-800">
                  <p className="text-sm text-neutral-300 leading-relaxed">{activeSnippet.snippet}</p>
                </div>
                <div className="flex items-center gap-2 mt-3 pt-2 border-t border-neutral-800/50">
                  <div className="w-4 h-4 rounded flex items-center justify-center text-xs font-bold" style={{ background: CHATBOTS.find(b=>b.id===activeBot)?.color + "20", color: CHATBOTS.find(b=>b.id===activeBot)?.color }}>
                    {CHATBOTS.find(b=>b.id===activeBot)?.name[0]}
                  </div>
                  <span className="text-xs text-neutral-500">{CHATBOTS.find(b=>b.id===activeBot)?.name} ({CHATBOTS.find(b=>b.id===activeBot)?.model})</span>
                  {level === "global" && <span className="text-xs text-neutral-600 ml-auto">Mention rate: {CHATBOT_BRAND_PERCEPTION[activeBot]?.mentionRate}%</span>}
                </div>
              </div>

              {/* Pillar-specific: show per-chatbot pillar bar chart */}
              {level === "pillar" && pillarId && (
                <div className="mt-4">
                  <p className="text-xs text-neutral-500 uppercase tracking-wider mb-2">Pillar Score by Chatbot</p>
                  <BarList items={CHATBOTS.map(b => ({
                    name: b.name,
                    value: CHATBOT_PILLAR_PERCEPTION[pillarId]?.[b.id]?.score || 0,
                    color: b.color
                  }))} maxValue={100} colorFn={item => item.color} />
                </div>
              )}

              {/* Product-specific: show competitor ranking */}
              {level === "product" && productName && (
                <div className="mt-4">
                  <p className="text-xs text-neutral-500 uppercase tracking-wider mb-2">Product Ranking Across Chatbots</p>
                  <div className="grid grid-cols-4 gap-2">
                    {CHATBOTS.map(b => {
                      const pd = CHATBOT_PRODUCT_PERCEPTION[productName]?.[b.id];
                      return (
                        <div key={b.id} className="bg-neutral-800/40 rounded-lg p-2 text-center">
                          <p className="text-xs font-medium" style={{ color: b.color }}>{b.name}</p>
                          <p className="font-serif text-lg font-bold text-white mt-0.5">#{pd?.rank || "-"}</p>
                          <div className={`w-2 h-2 rounded-full mx-auto mt-1 ${getSentimentColor(pd?.sentiment || "neutral")}`} />
                          <p className="text-xs text-neutral-500 mt-0.5">{pd?.mentioned ? "Mentioned" : "Not mentioned"}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </Card>

            {/* Strengths & Concerns */}
            <Card>
              <div className="mb-4">
                <p className="text-xs text-neutral-500 uppercase tracking-wider mb-3">Strengths Highlighted</p>
                <div className="space-y-2">
                  {activeSC.strengths.length > 0 ? activeSC.strengths.map((s, i) => (
                    <div key={i} className="flex items-start gap-2">
                      <div className="w-4 h-4 rounded-full bg-emerald-950/50 border border-emerald-800/30 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <Icon name="check" size={8} color="#10b981" />
                      </div>
                      <p className="text-xs text-neutral-300">{s}</p>
                    </div>
                  )) : (
                    <p className="text-xs text-neutral-600 italic">No strengths detected</p>
                  )}
                </div>
              </div>
              <div>
                <p className="text-xs text-neutral-500 uppercase tracking-wider mb-3">Gaps & Concerns</p>
                <div className="space-y-2">
                  {activeSC.concerns.length > 0 ? activeSC.concerns.map((c, i) => (
                    <div key={i} className="flex items-start gap-2">
                      <div className="w-4 h-4 rounded-full bg-red-950/50 border border-red-800/30 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <Icon name="x" size={8} color="#ef4444" />
                      </div>
                      <p className="text-xs text-neutral-300">{c}</p>
                    </div>
                  )) : (
                    <p className="text-xs text-neutral-600 italic">No concerns detected</p>
                  )}
                </div>
              </div>

              {/* Global: Top recommended products */}
              {level === "global" && (
                <div className="mt-4 pt-3 border-t border-neutral-800/50">
                  <p className="text-xs text-neutral-500 uppercase tracking-wider mb-2">Top Recommended</p>
                  <div className="space-y-1">
                    {(CHATBOT_BRAND_PERCEPTION[activeBot]?.topRecommended || []).map((p, i) => (
                      <div key={i} className="flex items-center gap-2 text-xs">
                        <span className="text-neutral-600 font-medium w-4">{i + 1}.</span>
                        <div className="w-1 h-3 rounded-full" style={{ background: PRODUCT_COLORS[p] || "#525252" }} />
                        <span className="text-neutral-300">{p}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Pillar: Narrative alignment */}
              {level === "pillar" && pillarId && (
                <div className="mt-4 pt-3 border-t border-neutral-800/50">
                  <p className="text-xs text-neutral-500 uppercase tracking-wider mb-2">Narrative Alignment</p>
                  <div className="space-y-2">
                    {CHATBOTS.map(b => {
                      const pp = CHATBOT_PILLAR_PERCEPTION[pillarId]?.[b.id];
                      const aMap = { strong: { c: "text-emerald-400", l: "Strong" }, moderate: { c: "text-amber-400", l: "Moderate" }, weak: { c: "text-red-400", l: "Weak" }, absent: { c: "text-neutral-600", l: "Absent" } };
                      const a = aMap[pp?.alignment] || aMap.absent;
                      return (
                        <div key={b.id} className="flex items-center justify-between text-xs">
                          <span className="text-neutral-400">{b.name}</span>
                          <span className={`font-medium ${a.c}`}>{a.l}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    }

    // ============================================================
    // SOCIAL PERCEPTION SECTION
    // ============================================================

    function SocialPerceptionSection({ level = "global", productName }) {
      if (level === "product") {
        const productData = PRODUCT_SOCIAL[productName];
        if (!productData) return null;
        return (
          <div>
            <SectionHeader title="Social Network Perception" icon="activity" />
            <div className="grid grid-cols-4 gap-4">
              {SOCIAL_NETWORKS.map(net => {
                const data = productData[net.id];
                if (!data) return null;
                const sc = getScoreColor(data.score);
                return (

    function RegionModal({ regionName, onClose }) {
      const region = REGIONS.find(r => r.name === regionName);
      const detail = REGION_DETAILS[regionName];
      if (!region || !detail) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-neutral-900 border border-neutral-700 rounded-2xl w-full max-w-lg p-6 shadow-2xl animate-fade-in" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="font-serif text-lg font-bold text-white">{regionName}</h2>
                <div className="flex items-center gap-2 mt-1">
                  <span className="font-serif text-2xl font-bold" style={{ color: getScoreColor(region.score).hex }}>{region.score}</span>
                  <TrendIndicator trend={region.trend} />
                  <span className={`text-xs px-2 py-0.5 rounded-full ${getScoreColor(region.score).bg} ${getScoreColor(region.score).text}`}>{getScoreLabel(region.score)}</span>
                </div>
              </div>
              <button onClick={onClose} className="text-neutral-500 hover:text-neutral-300 transition-colors">
                <Icon name="x" size={18} />
              </button>
            </div>
            <p className="text-sm text-neutral-400 leading-relaxed mb-4">{detail.summary}</p>
            <div className="border-t border-neutral-800 pt-4">
              <p className="text-xs text-neutral-500 uppercase tracking-wider mb-3">Key Signals</p>
              {detail.signals.map((s, i) => <SignalCard key={i} signal={s} />)}
            </div>
          </div>
        </div>

              </div>

            ) : (
              /* ===================== CAMPAIGN DETAIL ===================== */
              <div className="flex-1 overflow-y-auto">
                <div className="p-6 space-y-6">

                  {/* Header */}
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="flex items-center gap-2.5 mb-1.5">
                        <h2 className="text-base font-bold text-white">{campaign.name}</h2>
                        {(() => { const sb = STATUS_BADGE[campaign.status] || STATUS_BADGE.completed; return (
                          <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded border ${sb.bg} ${sb.text} ${sb.border}`}>{sb.label}</span>
                        ); })()}
                      </div>
                      <p className="text-xs text-neutral-400 leading-relaxed max-w-xl">{campaign.summary}</p>

                      {/* Assigned pillars */}
                      <div className="flex items-center gap-2 mt-3">
                        {PILLARS.filter(p => (campaign.pillarImpact[p.id] || 0) > 0).map(p => (
                          <span key={p.id} className="flex items-center gap-1.5 text-[10px] font-semibold px-2 py-1 rounded-lg" style={{ backgroundColor: p.color + '20', color: p.color }}>
                            <Icon name={p.icon} size={12} color={p.color} />
                            {p.name}
                          </span>
                        ))}
                      </div>
                    </div>
                    <div className="flex items-center gap-4 flex-shrink-0">
                      <div className="text-right">
                        <p className="text-[10px] text-neutral-500">Budget</p>
                        <p className="text-sm font-bold text-neutral-200">{campaign.budget}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] text-neutral-500">Period</p>
                        <p className="text-sm font-semibold text-neutral-300">{campaign.dateRange}</p>
                      </div>
                    </div>
                  </div>

                  {/* Top-line metrics */}
                  <div className="grid grid-cols-4 gap-3">
                    {[
                      { label: 'Total Impressions', value: campaign.metrics.totalImpressions, icon: 'eye' },
                      { label: 'Avg Engagement', value: campaign.metrics.avgEngagement, icon: 'activity' },
                      { label: 'Earned Media Value', value: campaign.metrics.earnedMediaValue, icon: 'dollar' },
                      { label: 'Sentiment Shift', value: (campaign.metrics.sentimentShift > 0 ? '+' : '') + campaign.metrics.sentimentShift + ' pts', icon: 'trending-up' }
                    ].map((m, i) => (
                      <div key={i} className="bg-neutral-900 border border-neutral-800 rounded-xl p-4">
                        <div className="flex items-center gap-2 mb-2">
                          <Icon name={m.icon} size={12} color="#525252" />
                          <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">{m.label}</p>
                        </div>
                        <p className="text-xl font-bold text-white">{m.value}</p>
                      </div>
                    ))}
                  </div>

                  {/* Detail sub-tabs */}
                  <div className="flex items-center gap-1 border-b border-neutral-800 pb-px">
                    {DETAIL_TABS.map(tab => {
                      const isActive = tab.id === detailTab;
                      return (
                        <button key={tab.id} onClick={() => setDetailTab(tab.id)}
                          className={`px-4 py-2.5 text-xs font-semibold transition-all border-b-2 -mb-px ${isActive ? 'text-teal-400 border-teal-400' : 'text-neutral-500 border-transparent hover:text-neutral-300'}`}>
                          {tab.label}
                        </button>
                      );
                    })}
                  </div>

                  {/* OVERVIEW TAB */}
                  {detailTab === 'overview' && (
                    <div className="grid grid-cols-2 gap-4">
                      {/* Pillar impact */}
                      <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5">
                        <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-4">Perception Pillar Impact</p>
                        <div className="space-y-3">
                          {PILLARS.map(p => {
                            const impact = campaign.pillarImpact[p.id] || 0;
                            return (
                              <div key={p.id} className="flex items-center gap-3">
                                <Icon name={p.icon} size={14} color={p.color} />
                                <span className="text-xs text-neutral-400 w-32 flex-shrink-0">{p.name}</span>
                                <div className="flex-1 h-2 bg-neutral-800 rounded-full overflow-hidden">
                                  {impact > 0 && <div className="h-full bg-teal-500 rounded-full" style={{ width: (impact / 10 * 100) + '%' }} />}
                                </div>
                                <span className={`text-xs font-bold w-12 text-right ${impact > 0 ? 'text-teal-400' : impact < 0 ? 'text-red-400' : 'text-neutral-600'}`}>
                                  {impact > 0 ? '+' + impact : impact === 0 ? '—' : impact}
                                </span>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Score projection */}
                      <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5">
                        <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-4">{campaign.status === 'projected' ? 'Projected Score Impact' : 'Score Impact'}</p>
                        <div className="space-y-4">
                          {PILLARS.filter(p => (campaign.pillarImpact[p.id] || 0) !== 0).map(p => {
                            const impact = campaign.pillarImpact[p.id] || 0;
                            const projected = Math.min(100, p.score + impact);
                            return (
                              <div key={p.id}>
                                <div className="flex items-center justify-between text-xs mb-1.5">
                                  <span className="text-neutral-400">{p.name}</span>
                                  <span>
                                    <span className="text-neutral-500">{p.score}</span>
                                    <span className="text-neutral-600 mx-1">→</span>
                                    <span className="text-white font-medium">{projected}</span>
                                    <span className={`ml-1 ${impact > 0 ? 'text-teal-400' : 'text-red-400'}`}>
                                      ({impact > 0 ? '+' : ''}{impact})
                                    </span>
                                  </span>
                                </div>
                                <div className="h-2 bg-neutral-800 rounded-full overflow-hidden relative">
                                  <div className="h-full rounded-full absolute" style={{ width: p.score + '%', background: '#525252' }} />
                                  <div className="h-full rounded-full absolute animate-bar" style={{ width: projected + '%', background: p.color }} />
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        <div className="flex items-center gap-3 mt-4 pt-3 border-t border-neutral-800">
                          {PILLARS.filter(p => (campaign.pillarImpact[p.id] || 0) !== 0).map(p => (
                            <div key={p.id} className="flex items-center gap-1.5">
                              <div className="w-2 h-2 rounded-full" style={{ backgroundColor: p.color }} />
                              <span className="text-[10px] text-neutral-500">{p.name}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* CHANNELS TAB */}
                  {detailTab === 'channels' && (
                    <div className="space-y-4">
                      {campaign.channelPerformance.map((ch, i) => {
                        const sentColor = ch.sentiment >= 75 ? 'text-teal-400' : ch.sentiment >= 55 ? 'text-amber-400' : 'text-red-400';
                        return (
                          <div key={i} className="bg-neutral-900 border border-neutral-800 rounded-xl p-5">
                            <div className="flex items-center justify-between mb-4">
                              <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-neutral-800 flex items-center justify-center">
                                  <Icon name="activity" size={16} color="#a3a3a3" />
                                </div>
                                <div>
                                  <p className="text-sm font-semibold text-white">{ch.channel}</p>
                                  <p className="text-[10px] text-neutral-500">{ch.impressions} impressions</p>
                                </div>
                              </div>
                              <div className={`text-lg font-bold ${sentColor}`}>{ch.sentiment}%</div>
                            </div>

                            <div className="grid grid-cols-3 gap-4">
                              <div className="bg-neutral-800/40 rounded-lg p-3">
                                <p className="text-[10px] text-neutral-500 mb-1">Impressions</p>
                                <p className="text-sm font-bold text-white">{ch.impressions}</p>
                              </div>
                              <div className="bg-neutral-800/40 rounded-lg p-3">
                                <p className="text-[10px] text-neutral-500 mb-1">Engagement Rate</p>
                                <p className="text-sm font-bold text-white">{ch.engagement}</p>
                              </div>
                              <div className="bg-neutral-800/40 rounded-lg p-3">
                                <p className="text-[10px] text-neutral-500 mb-1">Net Sentiment</p>
                                <div className="flex items-center gap-2">
                                  <div className="flex-1 h-2 rounded-full overflow-hidden bg-neutral-700">
                                    <div className="h-full bg-teal-500 rounded-full" style={{ width: ch.sentiment + '%' }} />
                                  </div>
                                  <span className={`text-xs font-bold ${sentColor}`}>{ch.sentiment}%</span>
                                </div>
                              </div>
                            </div>

                            {/* Channel-specific signals */}
                            <div className="mt-4 pt-3 border-t border-neutral-800">
                              <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-2">Signals from this channel</p>
                              <div className="space-y-1.5">
                                {campaign.keySignals.filter((sig, idx) => idx % campaign.channelPerformance.length === i).map((sig, j) => (
                                  <div key={j} className="flex items-center gap-2">
                                    <div className={`w-4 h-4 rounded-full flex items-center justify-center ${sig.sentiment === 'positive' ? 'bg-teal-950/60 text-teal-400' : 'bg-red-950/60 text-red-400'}`}>
                                      <Icon name={sig.sentiment === 'positive' ? 'check' : 'alert-circle'} size={10} />
                                    </div>
                                    <p className="text-[11px] text-neutral-300">{sig.title}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* SIGNALS TAB */}
                  {detailTab === 'signals' && (
                    <div className="space-y-4">
                      <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5">
                        <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-4">Key Signals {campaign.status === 'projected' ? 'Projected' : 'Generated'}</p>
                        <div className="space-y-3">
                          {campaign.keySignals.map((sig, i) => (
                            <div key={i} className="flex items-start gap-3 bg-neutral-800/30 rounded-lg px-4 py-3">
                              <div className={`w-6 h-6 rounded-full flex-shrink-0 mt-0.5 flex items-center justify-center ${sig.sentiment === 'positive' ? 'bg-teal-950/60 text-teal-400' : 'bg-red-950/60 text-red-400'}`}>
                                <Icon name={sig.sentiment === 'positive' ? 'check' : 'alert-circle'} size={12} />
                              </div>
                              <div className="flex-1">
                                <p className="text-xs text-neutral-200 leading-snug">{sig.title}</p>
                                <div className="flex items-center gap-2 mt-1.5">
                                  <span className={`text-[9px] font-semibold px-1.5 py-0.5 rounded ${sig.sentiment === 'positive' ? 'bg-teal-950/40 text-teal-400' : 'bg-red-950/40 text-red-400'}`}>
                                    {sig.sentiment === 'positive' ? 'Positive' : 'Negative'}
                                  </span>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* Pillar-by-pillar signal attribution */}
                      <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5">
                        <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-4">Pillar Attribution</p>
                        <p className="text-[11px] text-neutral-600 mb-4">How this campaign's signals distribute across perception pillars</p>
                        <div className="space-y-3">
                          {PILLARS.map(p => {
                            const impact = campaign.pillarImpact[p.id] || 0;
                            if (impact === 0) return null;
                            let totalImpact = 0;
                            Object.values(campaign.pillarImpact).forEach(v => { totalImpact += Math.abs(v); });
                            const pct = totalImpact > 0 ? Math.round(Math.abs(impact) / totalImpact * 100) : 0;
                            return (
                              <div key={p.id} className="flex items-center gap-3">
                                <Icon name={p.icon} size={14} color={p.color} />
                                <span className="text-xs text-neutral-300 w-32 flex-shrink-0">{p.name}</span>
                                <div className="flex-1 h-3 bg-neutral-800 rounded-full overflow-hidden">
                                  <div className="h-full rounded-full" style={{ width: pct + '%', backgroundColor: p.color }} />
                                </div>
                                <span className="text-xs font-bold text-neutral-300 w-10 text-right">{pct}%</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // APP ROOT
    // ============================================================

    function App() {
      const [view, setView] = useState("landing"); // landing | pillar | product | campaigns
      const [selectedPillar, setSelectedPillar] = useState(null);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [selectedRegion, setSelectedRegion] = useState(null);

      function handleSelectPillar(id) { setSelectedPillar(id); setView("pillar"); }
      function handleSelectProduct(name) { setSelectedProduct(name); setView("product"); }
      function handleSelectRegion(name) { setSelectedRegion(name); }
      function handleOpenCampaigns() { setView("campaigns"); }
      function handleBack(target) { setView(target || "landing"); setSelectedRegion(null); }

      const pillarName = selectedPillar ? PILLARS.find(p => p.id === selectedPillar)?.name : null;

      return (
        <div className="flex h-screen bg-[#0a0a0a] text-white font-sans">
          <Sidebar view={view} onNavigate={handleBack} onOpenCampaigns={handleOpenCampaigns} />
          <div className="flex-1 flex flex-col min-w-0">
            <HeaderBar view={view} pillarName={pillarName} productName={selectedProduct} onBack={handleBack} />
            <main className="flex-1 overflow-y-auto p-6">
              <div className="max-w-7xl mx-auto">
                {view === "landing" && (
                  <LandingPage
                    onSelectPillar={handleSelectPillar}
                    onSelectProduct={handleSelectProduct}
                    onSelectRegion={handleSelectRegion}
                  />
                )}
                {view === "pillar" && (
                  <PillarDetail pillarId={selectedPillar} onBack={handleBack} />
                )}
                {view === "product" && (
                  <ProductDetail productName={selectedProduct} onBack={handleBack} />
                )}
                {view === "campaigns" && (
                  <CampaignView onBack={handleBack} />
                )}
              </div>
            </main>
          </div>
          {selectedRegion && <RegionModal regionName={selectedRegion} onClose={() => setSelectedRegion(null)} />}
        </div>
      );
    }

    // ============================================================
    // RENDER
    // ============================================================

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
</html>
